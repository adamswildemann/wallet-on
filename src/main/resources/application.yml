spring:

  application:
    name: wallet-on

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/walleton?useSSL=false&serverTimezone=UTC
    username: root
    password: admin123

    jpa:
      hibernate:
        ddl-auto: validate
      show-sql: true
      properties:
        hibernate:
        hibernate.format_sql: true

    flyway:
      enabled: true
      locations: classpath:db/migration
      table: flyway_schema_history


